# Overrides main UAT config during automated tests (H2 in-memory)
spring:
  datasource:
    url: jdbc:h2:mem:highway_helper_uat;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true

app:
  jwt:
    secret: uat-secret-key-for-automated-tests-minimum-256-bits-required!!
    expiration-ms: 3600000
